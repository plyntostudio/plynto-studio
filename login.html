<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Plynto Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,450;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <a class="auth-logo" href="index.html">Plynto<span class="logo-dot">.</span></a>
      <div class="auth-label">Sign in to your account</div>
      <div class="auth-field">
        <label>Email</label>
        <input type="email" placeholder="you@example.com" />
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" />
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="window.location.href='portal.html'">Sign in</button>
      <div style="margin-top:16px;text-align:center">
        <a href="index.html" style="font-size:12px;color:var(--text-4)">&larr; Back to home</a>
      </div>
    </div>
  </div>
</body>
</html>
